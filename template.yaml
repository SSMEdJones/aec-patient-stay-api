AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Fast Appeal API - Lambda + API Gateway + CloudFront

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev
    Description: Deployment environment
  
  LangfuseHost:
    Type: String
    Default: ""
    Description: Langfuse observability host URL
  
  LangfuseProjectId:
    Type: String
    Default: ""
    Description: Langfuse project ID

Globals:
  Function:
    Timeout: 300  # 5 minutes for PDF processing + LLM calls
    MemorySize: 1024
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        LANGFUSE_HOST: !Ref LangfuseHost
        LANGFUSE_PROJECT_ID: !Ref LangfuseProjectId
        UPLOAD_BUCKET: !Ref UploadBucket
        # SSM CA bundle for corporate SSL
        REQUESTS_CA_BUNDLE: /var/task/ssm_ca_bundle.pem

Resources:
  # S3 Bucket for PDF uploads and generated documents
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub fast-appeal-uploads-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: CleanupTempFiles
            Status: Enabled
            ExpirationInDays: 7
            Prefix: temp/
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FastAppeal

  # Lambda Function (Container Image)
  FastAppealFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fast-appeal-api-${Environment}
      PackageType: Image
      ImageUri: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/fast-appeal-api:latest
      Architectures:
        - x86_64
      Policies:
        - Version: '2012-10-17'
          Statement:
            # S3 access for file uploads/downloads
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub ${UploadBucket.Arn}/*
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt UploadBucket.Arn
            # Bedrock for LLM
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "arn:aws:bedrock:*::foundation-model/*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .

  # HTTP API Gateway
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"
        MaxAge: 600

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub Fast Appeal API - ${Environment}
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          Compress: true
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Sub ${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
            OriginPath: !Sub /${Environment}
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        PriceClass: PriceClass_100  # North America, Europe only
        HttpVersion: http2
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FastAppeal

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
  
  CloudFrontUrl:
    Description: CloudFront distribution URL (use this for VITE_FAST_APPEAL_URL)
    Value: !Sub https://${CloudFrontDistribution.DomainName}
  
  CloudFrontDistributionId:
    Description: CloudFront distribution ID for cache invalidation
    Value: !Ref CloudFrontDistribution
  
  UploadBucketName:
    Description: S3 bucket for file uploads
    Value: !Ref UploadBucket
  
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt FastAppealFunction.Arn
